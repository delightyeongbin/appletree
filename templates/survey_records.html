<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>측정 기록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/survey_records.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="top-nav">
        <a class="brand" href="{{ url_for('home') }}">사과나무 측정 시스템</a>
        <a class="back-link" href="{{ url_for('home') }}">홈으로</a>
    </header>

    <main class="page">
        <section class="card">
            <div class="title-row">
                <div>
                    <h1>측정 기록</h1>
                    <p>저장된 입력 데이터 값을 확인할 수 있습니다.</p>
                </div>
                <div class="action-buttons">
                    <button id="refreshBtn" type="button">새로고침</button>
                    <button id="excelBtn" type="button" class="excel-btn">엑셀 저장</button>
                </div>
            </div>

            <div class="table-wrap">
                <div class="chart-wrap">
                    <div class="chart-head">
                        <h2>조사명별 항목 그래프</h2>
                        <p>항목별로 조사명 데이터를 누적 막대로 비교합니다.</p>
                    </div>
                    <div class="chart-controls">
                        <label for="itemSelect">항목 선택</label>
                        <select id="itemSelect"></select>
                    </div>
                    <div class="chart-kpis">
                        <div class="kpi-card">
                            <span>총 기록</span>
                            <strong id="kpiTotal">-</strong>
                        </div>
                        <div class="kpi-card">
                            <span>인식률</span>
                            <strong id="kpiRecognized">-</strong>
                        </div>
                        <div class="kpi-card">
                            <span>항목 평균(전체)</span>
                            <strong id="kpiAverage">-</strong>
                        </div>
                    </div>
                    <div class="chart-canvas-wrap">
                        <canvas id="recordsChart" height="260"></canvas>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>조사명</th>
                            <th>항목</th>
                            <th>값</th>
                            <th>단위</th>
                            <th>상태</th>
                            <th>입력시간</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                        <tr>
                            <td colspan="7" class="empty">기록을 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/survey_records.js') }}"></script>
</body>
</html>
