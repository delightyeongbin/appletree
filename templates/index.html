<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사과나무 측정 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <main class="app-shell">
        <header class="top-bar">
            <span class="time">9:41</span>
            <button class="settings-btn" type="button"><i class="fa-solid fa-gear"></i> 설정</button>
        </header>

        <section class="hero">
            <h1>사과나무 측정 시스템 <span class="leaf">🌿</span></h1>
            <p>잎 사이즈 및 과실크기를 음성으로 측정하세요</p>
            <img
                src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?auto=format&fit=crop&w=1400&q=80"
                alt="사과 과수원"
            />
        </section>

        <section class="quick-actions">
            <a class="action-card" href="{{ url_for('survey_setup') }}">
                <span class="icon icon-create"><i class="fa-solid fa-circle-plus"></i></span>
                <span class="txt">
                    <strong>조사명 생성하기</strong>
                    <small>새 조사명을 생성하고 측정을 시작합니다</small>
                </span>
                <i class="fa-solid fa-chevron-right"></i>
            </a>

            <a class="action-card" href="{{ url_for('survey_enter') }}">
                <span class="icon icon-enter"><i class="fa-solid fa-right-to-bracket"></i></span>
                <span class="txt">
                    <strong>조사 입장</strong>
                    <small>기존 조사에 입장하여 기록을 이어갑니다</small>
                </span>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </section>

        <nav class="bottom-nav">
            <button class="nav-item active" type="button"><i class="fa-solid fa-house"></i><span>홈</span></button>
            <a class="nav-item" href="{{ url_for('survey_records') }}"><i class="fa-regular fa-clock"></i><span>측정 기록</span></a>
            <button class="nav-item" type="button"><i class="fa-solid fa-chart-column"></i><span>통계</span></button>
            <button class="nav-item" type="button"><i class="fa-solid fa-arrow-up-from-bracket"></i><span>공유</span></button>
        </nav>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
